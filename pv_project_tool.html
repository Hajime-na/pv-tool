<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PV制作ツール</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101115;
      --panel: #191b22;
      --panel2: #20232c;
      --line: #343946;
      --text: #f6f1ea;
      --muted: #aaaebb;
      --accent: #f06d5f;
      --good: #79c98d;
      --warn: #e6bf6a;
      font-family: "BIZ UDPGothic", "Yu Gothic", "Meiryo", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: grid;
      grid-template-columns: minmax(620px, 1fr) 380px;
      overflow: hidden;
    }
    main {
      min-width: 0;
      height: 100vh;
      overflow: auto;
      padding: 14px;
      display: grid;
      gap: 10px;
      align-content: start;
    }
    aside {
      border-left: 1px solid var(--line);
      background: #15171d;
      padding: 16px;
      overflow: auto;
      max-height: 100vh;
    }
    h1, h2 {
      margin: 0;
      letter-spacing: 0;
    }
    h1 { font-size: 22px; }
    h2 { font-size: 15px; color: #ffe0d8; }
    .top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }
    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 12px;
      display: grid;
      gap: 10px;
      min-width: 0;
    }
    .panel.compact {
      padding: 10px;
      gap: 8px;
    }
    .collapsible[open] summary {
      margin-bottom: 8px;
    }
    summary {
      cursor: pointer;
      color: #ffe0d8;
      font-weight: 700;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
    }
    .workflow {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 8px;
    }
    .step {
      border: 1px solid var(--line);
      background: #141720;
      border-radius: 8px;
      padding: 8px;
      display: grid;
      gap: 8px;
    }
    .step strong {
      color: #ffe0d8;
      font-size: 13px;
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      min-width: 0;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      background: #11131a;
      color: var(--text);
      border-radius: 6px;
      padding: 8px;
      font: inherit;
      min-width: 0;
    }
    input[type="hidden"] { display: none; }
    .pathHint {
      border: 1px solid var(--line);
      background: #11131a;
      color: var(--muted);
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      word-break: break-all;
    }
    textarea {
      min-height: 76px;
      resize: vertical;
      line-height: 1.55;
    }
    button, .fileButton {
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover, .fileButton:hover { border-color: #626b7d; }
    button.primary { background: #5d2a26; border-color: #8f443c; }
    button.good { background: #24482e; border-color: #438052; }
    button.warn { background: #59451f; border-color: #8d6b2c; }
    input[type="file"] { display: none; }
    video {
      width: 100%;
      max-height: calc(100vh - 330px);
      min-height: 260px;
      border-radius: 8px;
      background: #050506;
      border: 1px solid var(--line);
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .syncReadout {
      display: grid;
      grid-template-columns: repeat(3, minmax(160px, 1fr));
      gap: 8px;
      border: 1px solid var(--line);
      background: #11131a;
      border-radius: 8px;
      padding: 9px;
    }
    .syncReadout div {
      display: grid;
      gap: 3px;
      min-width: 0;
    }
    .syncReadout span {
      color: var(--muted);
      font-size: 11px;
    }
    .syncReadout strong {
      color: #ffe0d8;
      font-size: 16px;
      font-variant-numeric: tabular-nums;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sceneTable {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .sceneTable th,
    .sceneTable td {
      border-bottom: 1px solid var(--line);
      padding: 7px;
      vertical-align: top;
    }
    .sceneTable th {
      color: var(--muted);
      font-size: 12px;
      text-align: left;
      font-weight: 700;
    }
    .sceneTable input,
    .sceneTable textarea,
    .sceneTable select {
      padding: 6px;
      font-size: 13px;
    }
    .sceneTable textarea { min-height: 58px; }
    .colTime { width: 78px; }
    .colMood { width: 108px; }
    .colStatus { width: 96px; }
    .colAct { width: 54px; }
    .sideList {
      display: grid;
      gap: 8px;
    }
    .sceneCard {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 9px 10px;
      display: grid;
      gap: 6px;
      cursor: pointer;
    }
    .sceneCard.active { outline: 2px solid var(--accent); }
    .sceneCard strong { color: #ffe0d8; font-size: 13px; }
    .sceneCard strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sceneCard .lyrics2 {
      color: var(--text);
      font-size: 12px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .lyricsPreview {
      min-height: 100px;
      max-height: 170px;
      overflow: auto;
      border: 1px solid var(--line);
      background: #11131a;
      border-radius: 6px;
      padding: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .mono {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 12px;
    }
    #lyricsOverlay .lyricLine {
      display: inline-block;
      background: rgba(0,0,0,0.62);
      color: #fff;
      font-size: clamp(14px, 2.2vw, 22px);
      font-weight: bold;
      letter-spacing: 0.06em;
      padding: 4px 14px 5px;
      border-radius: 4px;
      margin: 2px 0;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      white-space: pre;
    }
    #lyricsOverlay { display: flex; flex-direction: column; align-items: center; }
    .lineTimingList {
      max-height: 340px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #11131a;
    }
    .ltRow {
      display: grid;
      grid-template-columns: 54px 90px 1fr;
      gap: 6px;
      align-items: center;
      padding: 5px 8px;
      cursor: pointer;
      border-bottom: 1px solid #1d1f28;
      font-size: 13px;
    }
    .ltRow:last-child { border-bottom: none; }
    .ltRow:hover { background: #1d202b; }
    .ltRow.active { background: #2a1e2e; outline: 1px solid var(--accent); }
    .ltTime { font-variant-numeric: tabular-nums; color: var(--warn); font-size: 12px; }
    .ltSection { color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ltText { color: var(--text); }
    .output {
      min-height: 220px;
      font-family: ui-monospace, Consolas, monospace;
      font-size: 12px;
    }
    .statusLine {
      color: var(--muted);
      font-size: 12px;
      min-height: 18px;
    }
    .statusLine.working { color: #5ab4f5; }
    .statusLine.error   { color: #f07070; }
    @media (max-width: 1000px) {
      body { grid-template-columns: 1fr; }
      aside { max-height: none; border-left: 0; border-top: 1px solid var(--line); }
      .grid { grid-template-columns: 1fr 1fr; }
      .workflow { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <div>
        <h1>PV制作ツール</h1>
        <div class="statusLine" id="status">プロジェクト構成、素材メモ、シーン表をまとめます</div>
      </div>
      <div class="buttons">
        <button id="loadLocal" class="warn">保存データ読込</button>
        <button id="saveLocal" class="good">ブラウザ保存</button>
        <button id="exportJson" class="primary">JSON書き出し</button>
        <button id="saveFolder" class="good">同じフォルダに保存</button>
        <button id="burnPreview" class="warn">焼きこみプレビュー</button>
        <button id="burnFull" class="primary">本番焼きこみ</button>
        <button id="toggleEdit">編集欄を表示</button>
      </div>
    </div>

    <section class="panel compact">
      <h2>素材選択</h2>
      <div class="workflow">
        <div class="step">
          <strong>1. PV選択</strong>
          <label class="fileButton">曲を選ぶ（MP3 / WAV / MP4）<input id="songFile" type="file" multiple></label>
          <input id="projectDir" type="hidden" value="">
          <div class="pathHint">選択中: <span id="projectDirLabel">未選択</span></div>
          <label>曲フォルダ選択
            <select id="projectSelect" style="font-size:11px;width:100%">
              <option value="">── 読み込み中 ──</option>
            </select>
          </label>
          <label>または直接入力
            <input id="projectDirInput" type="text" placeholder="例: C:\Users\hana\Documents\音楽配信-20260412\君が生まれた雨の季節\PV" style="font-size:11px">
          </label>
          <label>同じフォルダの音源<select id="audioSelect"><option value="">選択してください</option></select></label>
          <label class="fileButton">PV選択（手動）<input id="videoFile" type="file"></label>
          <label>PVパス<input id="videoPath" value=""></label>
        </div>
        <div class="step">
          <strong>2. 歌詞ファイル選択</strong>
          <label class="fileButton">歌詞ファイル選択<input id="lyricsFile" type="file"></label>
          <select id="lyricsSelect" style="display:none"><option value=""></option></select>
          <label>歌詞パス<input id="lyricsPath" value=""></label>
        </div>
        <div class="step">
          <strong>3. 同期データ</strong>
          <button id="fetchTiming">PVフォルダ直下の同期JSONを読込</button>
          <label>同期JSONパス<input id="timingPath" value="pv_lyrics_timing.json"></label>
          <label class="fileButton">別JSONを手動選択<input id="timingFile" type="file" accept=".json,application/json"></label>
          <button id="loadProjectFiles">PVフォルダから候補読込</button>
        </div>
      </div>
      <div class="buttons">
        <button id="applyVideo">PVを表示</button>
        <button id="syncCurrent" class="primary">現在位置で同期</button>
        <button id="endCurrent" class="warn">現在位置で終了</button>
        <button id="prevScene">前のシーン</button>
        <button id="nextScene">次のシーン</button>
        <button id="nudgeBack5">-0.5s</button>
        <button id="nudgeBack">-0.1s</button>
        <button id="nudgeForward">+0.1s</button>
        <button id="nudgeForward5">+0.5s</button>
        <button id="prevPeak" class="warn">← 前行</button>
        <button id="nextPeak" class="warn">→ 次行</button>

        <button id="clearProject">表示を初期化</button>
        <button id="clearPathOnly" style="background:#888;color:#fff">フォルダ設定リセット</button>
      </div>
      <div style="position:relative;display:inline-block;width:100%">
        <video id="video" controls preload="metadata" style="width:100%;display:block"></video>
        <div id="lyricsOverlay" style="
          position:absolute;bottom:48px;left:0;right:0;
          text-align:center;pointer-events:none;
          padding:0 8%;
        "></div>
      </div>
      <div class="syncReadout">
        <div><span>現在time <small style="color:#888">（クリックで移動）</small></span><strong id="currentTimeLabel" style="cursor:pointer;text-decoration:underline dotted" title="クリックして秒数を入力して移動">0.00</strong></div>
        <div><span>選択シーン</span><strong id="activeSceneLabel">未選択</strong></div>
        <div><span>登録time</span><strong id="registeredTimeLabel">未登録</strong></div>
      </div>
    </section>

    <details class="panel collapsible" id="projectPanel">
      <summary>プロジェクト設定</summary>
      <div class="grid">
        <label>タイトル<input id="title" value=""></label>
        <label>音源<input id="audio" value=""></label>
        <label>尺<input id="duration" value="214.08"></label>
        <label>形式<select id="format"><option>16:9 横長</option><option>9:16 縦長</option><option>1:1 正方形</option></select></label>
      </div>
      <div class="grid">
        <label>背景素材<input id="background" value=""></label>
        <label>タイトル素材<input id="jacket" value=""></label>
        <label>出力名<input id="output" value=""></label>
        <label>作業状態<select id="projectStatus"><option>素材選択</option><option>歌詞確認</option><option>シーン設計</option><option>生成準備</option><option>確認待ち</option></select></label>
      </div>
    </details>

    <details class="panel collapsible" id="burnPanel">
      <summary>焼きこみ設定</summary>
      <div class="grid">
        <label>文字サイズ<input id="burnFontScale" type="number" min="0.6" max="1.8" step="0.05" value="1.0"></label>
        <label>文字種<select id="burnFontFamily"><option value="mincho">明朝</option><option value="gothic">ゴシック</option><option value="biz_gothic">太ゴシック</option><option value="pop">ポップ</option></select></label>
        <label>表示位置<select id="burnPosition"><option value="bottom">下</option><option value="middle">中央寄り</option><option value="upper">上</option></select></label>
        <label>左右余白<input id="burnMarginX" type="number" min="0" max="0.3" step="0.01" value="0.08"></label>
        <label>下余白<input id="burnMarginBottom" type="number" min="0" max="0.25" step="0.01" value="0.07"></label>
      </div>
      <div class="grid">
        <label>BOX濃さ<input id="burnBoxOpacity" type="number" min="0" max="0.9" step="0.05" value="0.52"></label>
        <label>BOX幅<input id="burnBoxWidth" type="number" min="0.35" max="0.98" step="0.01" value="0.84"></label>
        <label>表示行数<input id="burnLinesPerPage" type="number" min="1" max="4" step="1" value="2"></label>
        <label>区間名表示<input id="burnShowSection" type="checkbox"></label>
      </div>
      <div class="grid">
        <label>プレビュー開始秒<input id="burnPreviewStart" type="number" min="0" step="1" value="0"></label>
        <label>全体補正秒<input id="burnTimingOffsetStart" type="number" min="-5" max="5" step="0.05" value="0"></label>
        <label>曲末尾補正秒<input id="burnTimingOffsetEnd" type="number" min="-5" max="5" step="0.05" value="0"></label>
        <label>プレビュー秒数<input id="burnPreviewSeconds" type="number" min="5" max="120" step="5" value="35"></label>
      </div>
      <div class="buttons">
        <button id="setPreviewStartNow" type="button">現在位置からプレビュー</button>
        <button id="setPreviewStartLate" type="button">後半からプレビュー</button>
      </div>
    </details>

    <details class="panel collapsible" id="lyricsPanel">
      <summary>歌詞プレビュー</summary>
      <div id="lyricsPreview" class="lyricsPreview">歌詞ファイルを選ぶとここに表示します</div>
    </details>

    <details class="panel collapsible" id="conceptPanel">
      <summary>演出方針</summary>
      <textarea id="concept">同じ元絵を使っても、Aメロは淡く、サビは明るく、ブリッジは暗く、ラストは余韻を強める。</textarea>
    </details>

    <details class="panel collapsible" id="scenePanel">
      <summary>シーン表</summary>
      <div class="top">
        <h2>シーン表</h2>
        <div class="buttons">
          <button id="addScene">シーン追加</button>
          <button id="storyboard">絵コンテ出力</button>
          <button id="copyOutput">出力コピー</button>
        </div>
      </div>
      <table class="sceneTable">
        <thead>
          <tr>
            <th class="colTime">開始</th>
            <th class="colTime">終了</th>
            <th>区間</th>
            <th class="colMood">ムード</th>
            <th>歌詞 / 画作りメモ</th>
            <th class="colStatus">状態</th>
            <th class="colAct"></th>
          </tr>
        </thead>
        <tbody id="sceneBody"></tbody>
      </table>
    </details>

    <details class="panel collapsible" id="lineTimingPanel">
      <summary>行タイミング編集</summary>
      <div class="buttons" style="margin-bottom:6px">
        <button id="ltSetHere" class="good">▶ ここでセット</button>
        <button id="ltSave">💾 JSONに保存</button>
        <button id="ltReload" style="background:#555">↺ 再読込</button>
      </div>
      <div id="lineTimingList" class="lineTimingList"></div>
    </details>

    <details class="panel collapsible" id="outputPanel">
      <summary>出力</summary>
      <textarea id="outputBox" class="output mono" spellcheck="false"></textarea>
    </details>

  </main>

  <aside>
    <h2>シーンナビ</h2>
    <div class="sideList" id="sceneList"></div>
  </aside>

  <script>
    const $ = (id) => document.getElementById(id);
    function setStatus(msg) {
      const el = $("status");
      el.textContent = msg;
      const isWorking = /中[。．…\.]*$/.test(msg) || /^開始中/.test(msg);
      const isError   = /失敗|できません|エラー|not found|Error/i.test(msg);
      el.classList.toggle("working", isWorking && !isError);
      el.classList.toggle("error",   isError);
    }
    const moods = ["title", "memory", "wind", "bloom", "night", "last", "custom"];
    const statuses = ["未着手", "素材待ち", "作業中", "同期済み", "確認待ち", "完了"];
    let active = 0;
    let phrasePeaks = [];  // analyze_timing2.py が生成したフレーズピーク（秒）
    let lineTimings = [];  // 行タイミング編集用フラットリスト
    let activeLineTiming = 0;
    let rawLyrics = "";
    let selectedVideoUrl = "";
    let folderFileMap = new Map();
    let manualSelectionUntil = 0;
    let scenes = [
      { start: 0, end: 13.95, section: "Title", mood: "title", note: "タイトル、ジャケット、薄い花びら", status: "完了", synced: true, lines: [] },
      { start: 13.95, end: 41.51, section: "Verse 1", mood: "memory", note: "淡い寄り、左上歌詞、ゆっくりズーム", status: "作業中", synced: true, lines: ["チューリップが揺れるたびに", "あなたのこと 思い出すの"] },
      { start: 41.51, end: 51.59, section: "Pre-Chorus", mood: "wind", note: "明るく風、少し引き", status: "作業中", synced: true, lines: [] },
      { start: 51.59, end: 80.79, section: "Chorus", mood: "bloom", note: "花びら多め、彩度を上げる", status: "確認待ち", synced: true, lines: [] },
      { start: 147.19, end: 166.29, section: "Bridge", mood: "night", note: "暗め、青紫、心を閉じる感じ", status: "未着手", synced: false, lines: [] },
      { start: 166.29, end: 214.08, section: "Final Chorus", mood: "last", note: "温かい光、余韻、フェードアウト", status: "未着手", synced: false, lines: [] }
    ];

    function fmt(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n.toFixed(2) : "0.00";
    }

    function sceneTimeLabel(scene) {
      if (!scene.synced) return "未登録";
      return `${fmt(scene.start)}-${fmt(scene.end)}`;
    }

    function numberValue(id, fallback) {
      const value = Number($(id).value);
      return Number.isFinite(value) ? value : fallback;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function burnSettings() {
      return {
        font_scale: numberValue("burnFontScale", 1.0),
        font_family: $("burnFontFamily").value || "mincho",
        position: $("burnPosition").value || "bottom",
        margin_x: numberValue("burnMarginX", 0.08),
        margin_bottom: numberValue("burnMarginBottom", 0.07),
        box_opacity: numberValue("burnBoxOpacity", 0.52),
        box_width: numberValue("burnBoxWidth", 0.84),
        lines_per_page: Math.max(1, Math.min(4, Math.round(numberValue("burnLinesPerPage", 2)))),
        preview_start_seconds: numberValue("burnPreviewStart", 0),
        preview_seconds: numberValue("burnPreviewSeconds", 35),
        timing_offset_start: clamp(numberValue("burnTimingOffsetStart", 0), -5, 5),
        timing_offset_end: clamp(numberValue("burnTimingOffsetEnd", 0), -5, 5),
        show_section: $("burnShowSection").checked
      };
    }

    function setBurnSettings(settings = {}) {
      $("burnFontScale").value = settings.font_scale ?? 1.0;
      $("burnFontFamily").value = settings.font_family || "mincho";
      $("burnPosition").value = settings.position || "bottom";
      $("burnMarginX").value = settings.margin_x ?? 0.08;
      $("burnMarginBottom").value = settings.margin_bottom ?? 0.07;
      $("burnBoxOpacity").value = settings.box_opacity ?? 0.52;
      $("burnBoxWidth").value = settings.box_width ?? 0.84;
      $("burnLinesPerPage").value = settings.lines_per_page ?? 2;
      $("burnPreviewStart").value = settings.preview_start_seconds ?? 0;
      $("burnPreviewSeconds").value = settings.preview_seconds ?? 35;
      $("burnTimingOffsetStart").value = settings.timing_offset_start ?? 0;
      $("burnTimingOffsetEnd").value = settings.timing_offset_end ?? 0;
      $("burnShowSection").checked = Boolean(settings.show_section);
    }

    function setCurrentProjectDir(path, save = false) {
      const clean = String(path || "");
      $("projectDir").value = clean;
      $("projectDirLabel").textContent = clean || "未選択";
      if (save && clean) localStorage.setItem("pvToolProjectDir", clean);
    }

    function currentProjectDir() {
      // フルパス入力欄が入力されていればそちらを優先
      const manual = ($("projectDirInput").value || "").trim();
      if (manual) {
        setCurrentProjectDir(manual, true);
        return manual;
      }
      const value = $("projectDir").value || localStorage.getItem("pvToolProjectDir") || "";
      if (value && $("projectDir").value !== value) setCurrentProjectDir(value, true);
      return value;
    }

    // フルパス入力欄の変更を即反映
    $("projectDirInput").addEventListener("change", () => {
      const v = $("projectDirInput").value.trim();
      if (v) {
        setCurrentProjectDir(v, true);
        setStatus( `曲フォルダを設定しました: ${v}`);
      }
    });

    // 起動時にlocalStorageのパスをフルパス欄にも反映
    (function restoreProjectDirInput() {
      const saved = localStorage.getItem("pvToolProjectDir") || "";
      if (saved && saved.includes("\\")) $("projectDirInput").value = saved;
    })();

    // プロジェクト一覧をドロップダウンに読み込む
    (async function loadProjectList() {
      try {
        const res = await fetch("api/projects");
        const data = await res.json();
        const sel = $("projectSelect");
        sel.innerHTML = '<option value="">── 曲フォルダを選ぶ ──</option>';
        for (const p of data.projects || []) {
          const opt = document.createElement("option");
          opt.value = p.path;
          opt.textContent = p.name;
          if (p.path === ($("projectDirInput").value || "").trim()) opt.selected = true;
          sel.appendChild(opt);
        }
      } catch (e) {
        $("projectSelect").innerHTML = '<option value="">（取得失敗）</option>';
      }
    })();

    $("projectSelect").addEventListener("change", () => {
      const v = $("projectSelect").value;
      if (!v) return;
      $("projectDirInput").value = v;
      setCurrentProjectDir(v, true);
      setStatus( `曲フォルダを設定しました: ${v}`);
    });

    function project() {
      const projectDir = currentProjectDir();
      return {
        version: 1,
        title: $("title").value,
        duration: Number($("duration").value || 0),
        format: $("format").value,
        status: $("projectStatus").value,
        assets: {
          audio: $("audio").value,
          videoPreview: $("videoPath").value,
          projectDir,
          lyrics: $("lyricsPath").value,
          background: $("background").value,
          jacket: $("jacket").value,
          output: $("output").value
        },
        concept: $("concept").value,
        burnSettings: burnSettings(),
        lyricsText: rawLyrics,
        scenes
      };
    }

    function timingJson() {
      return {
        version: 1,
        audio: $("audio").value ? $("audio").value.split(/[\\/]/).pop() : "",
        timings: scenes.map((scene, index) => ({
          index,
          section: scene.section || `Scene ${index + 1}`,
          mood: scene.mood || "custom",
          start: scene.synced ? Number(scene.start) : null,
          end: scene.synced ? Number(scene.end) : null,
          lines: scene.lines || []
        }))
      };
    }

    function setProject(data) {
      $("title").value = data.title || "";
      $("duration").value = data.duration || "";
      $("format").value = data.format || "16:9 横長";
      $("projectStatus").value = data.status || "素材選択";
      $("audio").value = data.assets?.audio || "";
      $("videoPath").value = data.assets?.videoPreview || "";
      const restoredDir = data.assets?.projectDir || "";
      setCurrentProjectDir(restoredDir, true);
      if (restoredDir && restoredDir.includes("\\")) $("projectDirInput").value = restoredDir;
      $("lyricsPath").value = data.assets?.lyrics || "";
      $("background").value = data.assets?.background || "";
      $("jacket").value = data.assets?.jacket || "";
      $("output").value = data.assets?.output || "";
      $("concept").value = data.concept || "";
      setBurnSettings(data.burnSettings || {});
      rawLyrics = data.lyricsText || "";
      $("lyricsPreview").textContent = rawLyrics || "歌詞ファイルを選ぶとここに表示します";
      scenes = Array.isArray(data.scenes) ? data.scenes.map(scene => ({
        ...scene,
        synced: Boolean(scene.synced)
      })) : scenes;
      active = 0;
      render();
    }

    function render() {
      const body = $("sceneBody");
      body.innerHTML = "";
      scenes.forEach((scene, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input data-i="${index}" data-k="start" value="${fmt(scene.start)}"></td>
          <td><input data-i="${index}" data-k="end" value="${fmt(scene.end)}"></td>
          <td><input data-i="${index}" data-k="section" value="${escapeHtml(scene.section || "")}"></td>
          <td><select data-i="${index}" data-k="mood">${moods.map(m => `<option ${m === scene.mood ? "selected" : ""}>${m}</option>`).join("")}</select></td>
          <td><textarea data-i="${index}" data-k="note">${escapeHtml(scene.note || "")}</textarea></td>
          <td><select data-i="${index}" data-k="status">${statuses.map(s => `<option ${s === scene.status ? "selected" : ""}>${s}</option>`).join("")}</select></td>
          <td><button data-del="${index}">削除</button></td>
        `;
        body.appendChild(tr);
      });

      const list = $("sceneList");
      list.innerHTML = "";
      scenes.forEach((scene, index) => {
        const card = document.createElement("button");
        card.className = `sceneCard${index === active ? " active" : ""}`;
        card.title = `${sceneTimeLabel(scene)} ${scene.section || ""}\n${scene.note || ""}`;
        card.innerHTML = `<strong>BOX ${index + 1} ${sceneTimeLabel(scene)} ${escapeHtml(scene.section || "")}</strong><span class="lyrics2">${escapeHtml(scene.note || scene.lines?.join(" / ") || "")}</span>`;
        card.addEventListener("click", () => {
          active = index;
          manualSelectionUntil = Date.now() + 60000;
          const video = $("video");
          if (scene.synced && Number.isFinite(Number(scene.start))) {
            video.currentTime = Number(scene.start);
            setStatus( `${scene.section} に移動しました（60秒ロック中：この間に同期ボタンを押せます）`);
          } else {
            setStatus( `${scene.section} を選択しました（60秒ロック中：再生して同期ボタンを押してください）`);
          }
          render();
        });
        list.appendChild(card);
      });
      $("outputBox").value = JSON.stringify(project(), null, 2);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    $("sceneBody").addEventListener("input", (event) => {
      const el = event.target;
      const i = Number(el.dataset.i);
      const k = el.dataset.k;
      if (!Number.isInteger(i) || !k) return;
      scenes[i][k] = k === "start" || k === "end" ? Number(el.value) : el.value;
      renderSideOnly();
    });

    $("sceneBody").addEventListener("click", (event) => {
      const i = Number(event.target.dataset.del);
      if (!Number.isInteger(i)) return;
      scenes.splice(i, 1);
      active = Math.max(0, Math.min(active, scenes.length - 1));
      render();
    });

    function renderSideOnly() {
      $("outputBox").value = JSON.stringify(project(), null, 2);
      updateReadout();
    }

    // 自動追従専用：CSSクラスだけ更新してDOMを再構築しない
    function renderActiveOnly() {
      document.querySelectorAll("#sceneList .sceneCard").forEach((card, i) => {
        card.classList.toggle("active", i === active);
      });
      updateReadout();
    }

    function updateLyricsOverlay() {
      const ov = $("lyricsOverlay");
      if (!ov) return;
      const t = Number($("video").currentTime || 0);
      // 現在時刻に表示中の行を集める
      const active_lines = lineTimings.filter(lt => t >= lt.start && t < lt.end);
      if (active_lines.length === 0) { ov.innerHTML = ""; return; }
      ov.innerHTML = active_lines.map(lt =>
        `<div class="lyricLine">${escapeHtml(lt.text)}</div>`
      ).join("");
    }

    function updateReadout() {
      const scene = scenes[active];
      $("currentTimeLabel").textContent = fmt($("video").currentTime || 0);
      $("activeSceneLabel").textContent = scene ? `${active + 1}. ${scene.section || ""}` : "未選択";
      $("registeredTimeLabel").textContent = scene && scene.synced ? `${fmt(scene.start)}-${fmt(scene.end)}` : "未登録";
      updateLyricsOverlay();
    }

    function syncCurrentScene() {
      if (!scenes.length) return;
      const video = $("video");
      const current = Math.max(0, Math.round(Number(video.currentTime || 0) * 1000) / 1000);
      scenes[active].start = current;
      scenes[active].synced = true;
      if (scenes[active]._lt) scenes[active]._lt.start = current;
      if (active > 0) {
        scenes[active - 1].end = current;
        if (scenes[active - 1]._lt) scenes[active - 1]._lt.end = current;
      }
      if (active < scenes.length - 1 && Number(scenes[active].end) <= current) {
        scenes[active].end = Number(scenes[active + 1].start || (current + 10));
        if (scenes[active]._lt) scenes[active]._lt.end = scenes[active].end;
      }
      scenes[active].status = "同期済み";
      const syncedName = `${scenes[active].section}: ${scenes[active].note}`;
      if (active < scenes.length - 1) active += 1;
      activeLineTiming = active;
      manualSelectionUntil = Date.now() + 60000;
      setStatus(`${syncedName} → ${fmt(current)}s ✓  次: ${scenes[active].note}`);
      render();
      updateReadout();
    }

    function endCurrentScene() {
      if (!scenes.length) return;
      const video = $("video");
      const current = Math.max(0, Math.round(Number(video.currentTime || 0) * 1000) / 1000);
      const scene = scenes[active];
      scene.end = Math.max(Number(scene.start || 0), current);
      scene.synced = true;
      scene.status = "同期済み";
      const isLastScene = active === scenes.length - 1;
      if (isLastScene) {
        const rawDur = Number($("duration").value) || (Number.isFinite(video.duration) ? video.duration : 0);
        const end = rawDur > current + 0.2 ? rawDur : current + 30;
        scenes.push({
          start: current,
          end,
          section: "Outro",
          mood: "last",
          note: "歌詞なし。余韻だけ残す",
          status: "同期済み",
          synced: true,
          lines: []
        });
      } else {
        const nextStart = Number(scenes[active + 1]?.start) || (current + 10);
        scenes.splice(active + 1, 0, {
          start: current,
          end: nextStart,
          section: "間奏",
          mood: "custom",
          note: "歌詞なし",
          status: "同期済み",
          synced: true,
          lines: []
        });
      }
      setStatus( `${scene.section} を ${fmt(current)} 秒で終了にしました。次: ${scenes[Math.min(active + 1, scenes.length - 1)].section}（60秒ロック中）`);
      active = Math.min(active + 1, scenes.length - 1);
      manualSelectionUntil = Date.now() + 60000;
      render();
      updateReadout();
      localStorage.setItem("pvProjectTool.current", JSON.stringify(project()));
    }

    function moveActive(delta) {
      active = Math.max(0, Math.min(scenes.length - 1, active + delta));
      manualSelectionUntil = Date.now() + 2500;
      const start = Number(scenes[active]?.start);
      if (scenes[active]?.synced && Number.isFinite(start)) $("video").currentTime = Math.max(0, start);
      render();
      updateReadout();
    }

    function nudgeActive(delta) {
      if (!scenes.length) return;
      const next = Math.max(0, Math.round((Number(scenes[active].start || 0) + delta) * 1000) / 1000);
      scenes[active].start = next;
      scenes[active].synced = true;
      if (scenes[active]._lt) scenes[active]._lt.start = next;
      manualSelectionUntil = Date.now() + 2500;
      if (active > 0) {
        scenes[active - 1].end = next;
        if (scenes[active - 1]._lt) scenes[active - 1]._lt.end = next;
      }
      $("video").currentTime = next;
      setStatus(`${scenes[active].note} → ${fmt(next)}s`);
      render();
      updateReadout();
    }

    $("addScene").addEventListener("click", () => {
      const last = scenes[scenes.length - 1] || { end: 0 };
      scenes.push({ start: Number(last.end || 0), end: Number(last.end || 0) + 10, section: "New Scene", mood: "custom", note: "", status: "未着手", synced: false, lines: [] });
      active = scenes.length - 1;
      render();
    });

    $("syncCurrent").addEventListener("click", syncCurrentScene);
    $("endCurrent").addEventListener("click", endCurrentScene);
    $("prevScene").addEventListener("click", () => moveActive(-1));
    $("nextScene").addEventListener("click", () => moveActive(1));
    $("nudgeBack5").addEventListener("click", () => nudgeActive(-0.5));
    $("nudgeBack").addEventListener("click", () => nudgeActive(-0.1));
    $("nudgeForward").addEventListener("click", () => nudgeActive(0.1));
    $("nudgeForward5").addEventListener("click", () => nudgeActive(0.5));

    // ─── 行単位でビデオを移動（1押し = 1行）───
    function seekToLine(direction) {
      const positions = lineTimings.map(lt => lt.start).filter(Number.isFinite);
      if (!positions.length) { setStatus("行タイミングが読み込まれていません"); return; }
      const cur = Number($("video").currentTime || 0);
      let target = null, targetIdx = -1;
      if (direction > 0) {
        targetIdx = lineTimings.findIndex(lt => lt.start > cur + 0.3);
      } else {
        for (let i = lineTimings.length - 1; i >= 0; i--) {
          if (lineTimings[i].start < cur - 0.3) { targetIdx = i; break; }
        }
      }
      if (targetIdx < 0) { setStatus("その方向に行がありません"); return; }
      target = lineTimings[targetIdx].start;
      active = targetIdx;
      activeLineTiming = targetIdx;
      manualSelectionUntil = Date.now() + 60000;
      $("video").currentTime = target;
      setStatus(`${lineTimings[targetIdx].section}: ${lineTimings[targetIdx].text}  (${fmt(target)}s)`);
      renderActiveOnly();
    }
    $("prevPeak").addEventListener("click", () => seekToLine(-1));
    $("nextPeak").addEventListener("click", () => seekToLine(1));

    // ─── 行タイミング編集 ───
    function renderLineTimings() {
      const ul = $("lineTimingList");
      if (!ul) return;
      ul.innerHTML = "";
      lineTimings.forEach((lt, i) => {
        const div = document.createElement("div");
        div.className = `ltRow${i === activeLineTiming ? " active" : ""}`;
        div.innerHTML = `<span class="ltTime">${fmt(lt.start)}</span><span class="ltSection">${escapeHtml(lt.section)}</span><span class="ltText">${escapeHtml(lt.text)}</span>`;
        div.addEventListener("click", () => {
          activeLineTiming = i;
          $("video").currentTime = lt.start;
          renderLineTimings();
          setStatus(`行選択: ${lt.text} (${fmt(lt.start)}s)`);
        });
        ul.appendChild(div);
      });
      ul.querySelectorAll(".ltRow")[activeLineTiming]?.scrollIntoView({ block: "nearest" });
    }

    function setLineTimingHere() {
      if (!lineTimings.length) { setStatus("行タイミングが読み込まれていません"); return; }
      const t = Math.round(Number($("video").currentTime) * 100) / 100;
      lineTimings[activeLineTiming].start = t;
      if (activeLineTiming > 0) lineTimings[activeLineTiming - 1].end = t;
      const text = lineTimings[activeLineTiming].text;
      if (activeLineTiming < lineTimings.length - 1) {
        activeLineTiming++;
        const nextStart = lineTimings[activeLineTiming].start;
        // 次行の推定開始1秒前にシーク（ピークを探しやすいよう手前から）
        $("video").currentTime = Math.max(t + 0.5, nextStart - 1.0);
        setStatus(`「${text}」→ ${fmt(t)}s ✓  次: ${lineTimings[activeLineTiming].text}`);
      } else {
        setStatus(`「${text}」→ ${fmt(t)}s ✓（最終行）`);
      }
      renderLineTimings();
    }

    async function saveLineTimings() {
      const projectDir = currentProjectDir();
      if (!projectDir) { setStatus("プロジェクトフォルダを設定してください"); return; }
      // 末尾 end を補完
      for (let i = 0; i < lineTimings.length; i++) {
        const next = lineTimings[i + 1];
        lineTimings[i].end = (next && next.section === lineTimings[i].section)
          ? next.start : lineTimings[i].sectionEnd;
      }
      try {
        const res = await fetch(projectFileUrl("pv_lyrics_timing.json"), { cache: "no-store" });
        if (!res.ok) throw new Error("読込失敗");
        const data = JSON.parse(await res.text());
        let li = 0;
        for (const item of data.timings || []) {
          for (const lt of item.line_timings || []) {
            if (li < lineTimings.length) {
              lt.start = lineTimings[li].start;
              lt.end   = lineTimings[li].end;
              li++;
            }
          }
        }
        const content = JSON.stringify(data, null, 2);
        const saveRes = await fetch("/api/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ filename: "pv_lyrics_timing.json", content, projectDir })
        });
        const sd = await saveRes.json();
        setStatus(sd.ok ? "タイミングJSONを保存しました ✓" : `保存失敗: ${sd.error}`);
      } catch (e) { setStatus(`エラー: ${e}`); }
    }

    $("ltSetHere").addEventListener("click", setLineTimingHere);
    $("ltSave").addEventListener("click", saveLineTimings);
    $("ltReload").addEventListener("click", async () => {
      const ok = await loadTimingFromProject();
      if (!ok) setStatus("タイミングJSON読込失敗");
    });

    $("currentTimeLabel").addEventListener("click", () => {
      const current = Number($("video").currentTime || 0);
      const input = prompt("移動先の秒数を入力（例: 45.3）", current.toFixed(3));
      if (input === null) return;
      const t = parseFloat(input);
      if (!Number.isFinite(t) || t < 0) return;
      $("video").currentTime = t;
      updateReadout();
    });
    $("toggleEdit").addEventListener("click", () => {
      const panels = [$("projectPanel"), $("lyricsPanel"), $("conceptPanel"), $("scenePanel"), $("outputPanel")];
      const shouldOpen = panels.some(panel => !panel.open);
      panels.forEach(panel => { panel.open = shouldOpen; });
      $("toggleEdit").textContent = shouldOpen ? "編集欄を閉じる" : "編集欄を表示";
    });

    $("applyVideo").addEventListener("click", () => {
      selectedVideoUrl = "";
      loadVideoFromPath($("videoPath").value);
    });

    $("videoFile").addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) return;
      if (selectedVideoUrl) URL.revokeObjectURL(selectedVideoUrl);
      selectedVideoUrl = URL.createObjectURL(file);
      const video = $("video");
      video.src = selectedVideoUrl;
      video.load();
      $("videoPath").value = file.name;
      setCurrentProjectDir("");
      setStatus( `PV選択: ${file.name}`);
      renderSideOnly();
    });


    $("lyricsSelect").addEventListener("change", () => {
      if (!$("lyricsSelect").value) return;
      const fname = $("lyricsSelect").value;
      $("lyricsPath").value = fname;
      if (folderFileMap.has(fname)) {
        folderFileMap.get(fname).text().then(text => applyLyrics(text));
      } else {
        fetch(projectFileUrl(fname), { cache: "no-store" })
          .then(r => r.ok ? r.text() : Promise.reject())
          .then(text => applyLyrics(text))
          .catch(() => { setStatus( "歌詞TXTが見つかりません"); });
      }
    });
    $("audioSelect").addEventListener("change", () => {
      if ($("audioSelect").value) $("audio").value = $("audioSelect").value;
    });
    $("loadProjectFiles").addEventListener("click", loadFileLists);

    $("songFile").addEventListener("change", async (event) => {
      const files = Array.from(event.target.files);
      if (!files.length) return;
      folderFileMap.clear();
      files.forEach(f => folderFileMap.set(f.name, f));
      const mp4s = [], wavs = [], txts = [], jsons = [];
      for (const f of files) {
        const lower = f.name.toLowerCase();
        if (lower.endsWith(".mp4")) mp4s.push(f.name);
        else if (lower.endsWith(".wav") || lower.endsWith(".mp3")) wavs.push(f.name);
        else if (lower.endsWith(".txt")) txts.push(f.name);
        else if (lower.endsWith(".json")) jsons.push(f.name);
      }
      if (wavs.length) {
        fillSelect($("audioSelect"), wavs, "選択してください");
        $("audioSelect").value = wavs[0];
        $("audio").value = wavs[0];
      }
      if (mp4s.length) {
        fillSelect($("videoSelect"), mp4s, "選択してください");
        $("videoSelect").value = mp4s[0];
        $("videoPath").value = mp4s[0];
        if (selectedVideoUrl) URL.revokeObjectURL(selectedVideoUrl);
        selectedVideoUrl = URL.createObjectURL(folderFileMap.get(mp4s[0]));
        const video = $("video");
        video.src = selectedVideoUrl;
        video.load();
        renderSideOnly();
      }
      if (txts.length) {
        fillSelect($("lyricsSelect"), txts, "選択してください");
        $("lyricsSelect").value = txts[0];
        $("lyricsPath").value = txts[0];
        applyLyrics(await folderFileMap.get(txts[0]).text(), true); // 必ずシーンを作り直す
      }
      const timingName = jsons.find(n => n === "pv_lyrics_timing.json") || jsons[0];
      if (timingName) applyTiming(await folderFileMap.get(timingName).text()); // タイミングで上書き
      const label = files[0].name.replace(/\.[^.]+$/, "");
      $("projectDirLabel").textContent = label;
      setStatus( `読込完了：音源${wavs.length} PV${mp4s.length} 歌詞${txts.length} JSON${jsons.length}件`);
    });

    function loadVideoFromPath(path, cacheBust = false) {
      const clean = String(path || "").trim();
      if (!clean) {
        setStatus( "PVパスが空です");
        return;
      }
      const video = $("video");
      video.src = projectFileUrl(clean, cacheBust);
      video.load();
      setStatus( `PVを読み込み中: ${clean}`);
      renderSideOnly();
    }

    $("video").addEventListener("loadedmetadata", () => {
      const d = $("video").duration;
      if (Number.isFinite(d) && d > 0) {
        $("duration").value = d.toFixed(2);
        setStatus( `PVを読み込みました: ${d.toFixed(2)}秒`);
        renderSideOnly();
      }
    });

    $("video").addEventListener("error", () => {
      const src = $("video").getAttribute("src") || $("videoPath").value;
      setStatus( `PVを表示できません: ${src}。同じフォルダのPVを選ぶか、PV選択からファイルを選んでください`);
    });

    function projectFileUrl(path, cacheBust = false) {
      const bust = cacheBust ? `&_=${Date.now()}` : "";
      const projectDir = currentProjectDir();
      if (!projectDir) return encodeURI(path);
      return `project-file?projectDir=${encodeURIComponent(projectDir)}&path=${encodeURIComponent(path)}${bust}`;
    }

    function showBurnResult(output) {
      const status = $("status");
      status.textContent = "";
      status.classList.remove("working", "error");
      const message = document.createElement("span");
      message.textContent = `${output} をPVフォルダに作成しました `;
      const openButton = document.createElement("button");
      openButton.type = "button";
      openButton.textContent = "→開く";
      openButton.addEventListener("click", () => {
        $("videoPath").value = output;
        loadVideoFromPath(output, true);
        $("video").scrollIntoView({ block: "center" });
      });
      status.append(message, openButton);
    }

    $("video").addEventListener("timeupdate", () => {
      updateReadout();
      if ($("video").paused) return;
      if (Date.now() < manualSelectionUntil) return;
      if (scenes[active] && !scenes[active].synced) return;
      const t = Number($("video").currentTime || 0);
      const found = scenes.findIndex((scene) => scene.synced && Number(scene.start) <= t && t < Number(scene.end));
      if (found >= 0 && found !== active) {
        active = found;
        renderActiveOnly();
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.target.matches("input, textarea, select")) return;
      if (event.code === "Enter") {
        event.preventDefault();
        syncCurrentScene();
      }
      if (event.code === "ArrowUp") {
        event.preventDefault();
        moveActive(-1);
      }
      if (event.code === "ArrowDown") {
        event.preventDefault();
        moveActive(1);
      }
      // 同期位置微調整: , . で ±0.1s、< > で ±0.5s
      if (event.code === "Comma" && !event.shiftKey) { event.preventDefault(); nudgeActive(-0.1); }
      if (event.code === "Period" && !event.shiftKey) { event.preventDefault(); nudgeActive(0.1); }
      if (event.code === "Comma" && event.shiftKey) { event.preventDefault(); nudgeActive(-0.5); }
      if (event.code === "Period" && event.shiftKey) { event.preventDefault(); nudgeActive(0.5); }
    });

    $("lyricsFile").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      $("lyricsPath").value = file.name;
      applyLyrics(await file.text());
    });

    $("timingFile").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      applyTiming(await file.text());
    });


    async function loadTimingFromProject() {
      try {
        const timingPath = $("timingPath").value.trim() || "pv_lyrics_timing.json";
        const res = await fetch(projectFileUrl(timingPath), { cache: "no-store" });
        if (!res.ok) throw new Error("not found");
        applyTiming(await res.text());
        return true;
      } catch {
        return false;
      }
    }

    $("fetchTiming").addEventListener("click", async () => {
      if (!await loadTimingFromProject()) {
        setStatus( "PVフォルダ直下の同期JSONが見つかりません");
      }
    });

    function applyLyrics(text, resetScenes = false) {
      rawLyrics = text.replace(/\r\n/g, "\n");
      $("lyricsPreview").textContent = rawLyrics || "歌詞が空です";
      const blocks = parseLyrics(rawLyrics);
      const hasTimingData = scenes.length > 0 && scenes.some(s => s.synced || s.start > 0 || s.end > 0);
      if (blocks.length && (!hasTimingData || resetScenes)) {
        const step = Number($("duration").value || 180) / Math.max(1, blocks.length + 1);
        scenes = [
          { start: 0, end: Number(step.toFixed(2)), section: "Title", mood: "title", note: "タイトル表示", status: "未着手", synced: false, lines: [] },
          ...blocks.map((block, index) => ({
            start: Number(((index + 1) * step).toFixed(2)),
            end: Number(((index + 2) * step).toFixed(2)),
            section: block.section,
            mood: guessMood(block.section),
            note: block.lines.join(" / "),
            status: "未着手",
            synced: false,
            lines: block.lines
          }))
        ];
        setStatus( "歌詞ファイルからシーン表を作りました");
      } else if (blocks.length) {
        // タイミングデータが既存の場合はrawLyricsの表示のみ更新。
        // scene.linesはタイミングJSONが正式ソース。parseLyricsが【】を認識できないため
        // 全行が1ブロックに入りBOX2だけに上書きされる問題を防ぐ。
        setStatus( "歌詞テキストを読み込みました（タイミングデータは保持）");
      }
      render();
    }

    function parseLyrics(text) {
      const result = [];
      let section = "Verse";
      let lines = [];
      for (const raw of text.split("\n")) {
        const line = raw.trim();
        if (!line) continue;
        if (line.startsWith("[") && line.endsWith("]")) {
          if (lines.length) result.push({ section, lines });
          section = line.slice(1, -1);
          lines = [];
        } else {
          lines.push(line);
        }
      }
      if (lines.length) result.push({ section, lines });
      return result;
    }

    function guessMood(section) {
      const s = String(section).toLowerCase();
      if (s.includes("chorus")) return s.includes("final") ? "last" : "bloom";
      if (s.includes("bridge")) return "night";
      if (s.includes("pre")) return "wind";
      if (s.includes("title")) return "title";
      return "memory";
    }

    function applyTiming(text) {
      const data = JSON.parse(text);
      if (Array.isArray(data.phrase_peaks) && data.phrase_peaks.length > 0) {
        phrasePeaks = data.phrase_peaks.map(Number).filter(Number.isFinite).sort((a,b)=>a-b);
      }
      const timings = (data.timings || []).filter(item => item.start !== null && item.start !== undefined);

      // line_timings があれば 1行=1BOX でシーン構築
      const flatLines = [];
      for (const item of timings) {
        for (const lt of item.line_timings || []) {
          flatLines.push({
            section: item.section || "",
            sectionEnd: Number(item.end),
            text: String(lt.text || ""),
            start: Number(lt.start),
            end: Number(lt.end),
            mood: item.mood || "custom"
          });
        }
      }

      if (flatLines.length > 0) {
        // lineTimings と scenes を同じオブジェクト配列で共有
        lineTimings = flatLines;
        scenes = flatLines.map(lt => ({
          start: lt.start,
          end: lt.end,
          section: lt.section,
          mood: lt.mood,
          note: lt.text,
          status: "同期済み",
          synced: true,
          lines: [lt.text],
          _lt: lt   // lineTimings への参照
        }));
      } else {
        // line_timings なし: 旧来の1セクション=1シーン
        lineTimings = [];
        scenes = timings.map((item, index) => {
          const next = timings[index + 1];
          const end = item.end != null ? Number(item.end)
            : (next ? Number(next.start) : Number($("duration").value || item.start));
          return {
            start: Number(item.start), end,
            section: item.section || `Scene ${index + 1}`,
            mood: item.mood || "custom",
            note: (item.lines || []).join(" / "),
            status: "同期済み", synced: true,
            lines: item.lines || []
          };
        });
      }

      active = 0;
      activeLineTiming = 0;
      renderLineTimings();
      setStatus(`同期JSON読込: ${scenes.length}BOX（1行=1BOX）`);
      render();
    }

    $("clearProject").addEventListener("click", () => {

      $("projectDirInput").value = "";

    $("clearPathOnly").addEventListener("click", () => {
      localStorage.removeItem("pvToolProjectDir");
      $("projectDir").value = "";
      $("projectDirInput").value = "";
      $("projectDirLabel").textContent = "未選択";
      $("projectSelect").value = "";
      setStatus( "フォルダ設定をリセットしました");
    });

    $("saveLocal").addEventListener("click", () => {
      localStorage.setItem("pvProjectTool.current", JSON.stringify(project()));
      setStatus( "ブラウザに保存しました");
    });

    $("loadLocal").addEventListener("click", () => {

        setStatus( "保存データがありません");

      setStatus( "ブラウザ保存データを読み込みました（ディスクへの書き込みは「同じフォルダに保存」で）");
    });

    $("exportJson").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(project(), null, 2)], { type: "application/json" });
      const a = document.createElement("a");

    $("saveFolder").addEventListener("click", async () => {
      const projectDir = currentProjectDir();
      if (!projectDir.trim()) {
        setStatus( "保存できません: 曲フォルダを選んでください");
        return;
      }
      try {
        await saveToFolder(projectDir);
        setStatus( `${projectDir} に保存しました（ブラウザにも自動保存）`);
      } catch (error) {
        setStatus( `曲フォルダに保存できません: ${error.message}`);
      }
    });

    async function saveToFolder(projectDir) {
      const files = [
        ["pv_project.json", JSON.stringify(project(), null, 2)],
        ["pv_lyrics_timing.json", JSON.stringify(timingJson(), null, 2)]
      ];
      for (const [filename, content] of files) {
        const res = await fetch("api/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ filename, content, projectDir })
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || filename);
      }
      localStorage.setItem("pvProjectTool.current", JSON.stringify(project()));
    }

    async function burnLyrics(mode) {
      const projectDir = currentProjectDir();
      if (!projectDir.trim()) {
        setStatus( "焼きこみできません: 曲フォルダを選んでください");
        return;
      }
      if (projectDir.toLowerCase().includes("\\pv-tool")) {
        setStatus( "焼きこみできません: 曲フォルダはツール本体ではなく、C:\\Codex\\PV\\曲名 を指定してください");
        return;
      }
      try {
        setStatus( "タイミングファイルを保存中...");
        await saveToFolder(projectDir);
      } catch (error) {
        setStatus( `焼きこみ失敗: タイミングファイルの保存エラー: ${error.message}`);
        return;
      }
      setStatus( mode === "preview" ? "焼きこみプレビュー生成中... 0%" : "本番焼きこみ生成中... 0%");
      const output = mode === "preview" ? "lyrics_burn_preview.mp4" : ($("output").value || "lyrics_burned.mp4");
      const settings = burnSettings();
      const totalSec = Number($("duration").value) || Number($("video").duration) || 0;
      try {
        const res = await fetch("api/burn", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            projectDir, mode,
            previewSeconds: settings.preview_seconds,
            previewStartSeconds: settings.preview_start_seconds,
            output, totalSec, burnSettings: settings
          })
        });
        const startData = await res.json();
        if (!startData.ok) throw new Error(startData.error || "burn failed");
      } catch (error) {
        setStatus( `焼きこみ失敗: ${error.message}`);
        return;
      }
      // 完了までポーリング
      const label = mode === "preview" ? "プレビュー生成中" : "本番焼きこみ中";
      await new Promise((resolve) => {
        const pollId = setInterval(async () => {
          try {
            const s = await (await fetch("api/burn-status", { cache: "no-store" })).json();
            setStatus( `${label}: ${s.progress} (${s.percent}%)`);
            if (s.done) {
              clearInterval(pollId);
              if (s.error) {
                setStatus( `焼きこみ失敗: ${s.error}`);
              } else {
                setStatus( mode === "preview" ? "プレビュー完成！" : "本番焼きこみ完成！");
                showBurnResult(output);
                loadVideoFromPath(output, true);
                $("video").scrollIntoView({ block: "center" });
              }
              resolve();
            }
          } catch { }
        }, 1000);
      });
    }

    $("burnPreview").addEventListener("click", () => burnLyrics("preview"));
    $("burnFull").addEventListener("click", () => burnLyrics("full"));
    function chunkLines(lines, size) {
      const chunks = [];
      for (let i = 0; i < lines.length; i += size) chunks.push(lines.slice(i, i + size));
      return chunks;
    }

    function splitLongBoxes() {
      const newScenes = [];
      let changed = 0;
      for (const scene of scenes) {
        const lines = (scene.lines || []).filter(line => String(line).trim());
        const duration = Number(scene.end) - Number(scene.start);
        if (!scene.synced || lines.length <= 4 || !Number.isFinite(duration) || duration <= 0) {
          newScenes.push(scene);
          continue;
        }
        const chunkSize = lines.length >= 7 ? 4 : 3;
        const chunks = chunkLines(lines, chunkSize);
        const step = duration / chunks.length;
        chunks.forEach((chunk, index) => {
          const start = Number(scene.start) + step * index;
          const end = index === chunks.length - 1 ? Number(scene.end) : Number(scene.start) + step * (index + 1);
          newScenes.push({
            ...scene,
            start: Number(start.toFixed(3)),
            end: Number(end.toFixed(3)),
            section: index === 0 ? scene.section : `${scene.section} ${index + 1}`,
            note: chunk.join(" / "),
            lines: chunk
          });
        });
        changed += chunks.length - 1;
      }
      if (!changed) {
        setStatus( "細分化できる長いBOXはありません");
        return;
      }
      scenes = newScenes;
      active = Math.min(active, scenes.length - 1);
      setStatus( `長いBOXを細分化しました: ${scenes.length} BOX`);
      render();
    }

    const splitButton = document.createElement("button");
    splitButton.id = "splitBoxes";
    splitButton.type = "button";
    splitButton.className = "warn";
    splitButton.textContent = "BOX細分化";
    splitButton.addEventListener("click", splitLongBoxes);
    $("burnFull").insertAdjacentElement("afterend", splitButton);
    $("setPreviewStartNow").addEventListener("click", () => {
      $("burnPreviewStart").value = Math.max(0, Math.floor($("video").currentTime || 0));
      setStatus( `プレビュー開始秒を ${$("burnPreviewStart").value} にしました`);
    });
    $("setPreviewStartLate").addEventListener("click", () => {
      const duration = Number($("duration").value || $("video").duration || 0);
      $("burnPreviewStart").value = Math.max(0, Math.floor(duration * 0.65));
      setStatus( `後半確認用にプレビュー開始秒を ${$("burnPreviewStart").value} にしました`);
    });

    $("storyboard").addEventListener("click", () => {
      const p = project();
      const lines = [
        `# ${p.title} PV制作メモ`,
        "",
        `- duration: ${p.duration}s`,
        `- format: ${p.format}`,
        `- status: ${p.status}`,
        `- audio: ${p.assets.audio}`,
        `- lyrics: ${p.assets.lyrics}`,
        `- preview: ${p.assets.videoPreview}`,
        `- output: ${p.assets.output}`,
        "",
        "## concept",
        p.concept,
        "",
        "## scenes",
        ...p.scenes.map((s, i) => `${i + 1}. ${fmt(s.start)}-${fmt(s.end)} ${s.section} [${s.mood}] ${s.status}\n   ${s.note || ""}`)
      ];
      $("outputBox").value = lines.join("\n");
      setStatus( "絵コンテ用Markdownを出力しました");
    });

    $("copyOutput").addEventListener("click", async () => {
      await navigator.clipboard.writeText($("outputBox").value);
      setStatus( "出力をコピーしました");
    });

    async function loadFileLists() {
      try {
        const projectDir = currentProjectDir();
        if (!projectDir.trim()) {
          setStatus( "曲フォルダを選んでください");
          return;
        }
        if (projectDir.toLowerCase().includes("\\pv-tool")) {
          setStatus( "曲フォルダはツール本体ではなく、C:\\Codex\\PV\\曲名 を指定してください");
          return;
        }
        const query = `?projectDir=${encodeURIComponent(projectDir)}`;
        const res = await fetch(`api/files${query}`, { cache: "no-store" });
        if (!res.ok) return;
        const data = await res.json();
        setCurrentProjectDir(projectDir, true);
        const videos = data.videos || [];
        const currentVideo = $("videoPath").value;
        const videoToLoad = videos.includes(currentVideo) ? currentVideo : (videos[0] || "");
        if (videoToLoad) {
          $("videoPath").value = videoToLoad;
          loadVideoFromPath(videoToLoad);
        }
        $("timingPath").value = "pv_lyrics_timing.json";
        const timingLoaded = await loadTimingFromProject();
        // pv_project.json から burnSettings を読んでフォームに反映
        try {
          const pjRes = await fetch(projectFileUrl("pv_project.json"), { cache: "no-store" });
          if (pjRes.ok) {
            const pj = await pjRes.json();
            if (pj.burnSettings) setBurnSettings(pj.burnSettings);
          }
        } catch {}
        // 歌詞ファイル: プロジェクトの一覧で強制更新（別プロジェクトの残留を防ぐ）
        const lyrics = data.lyrics || [];
        fillSelect($("lyricsSelect"), lyrics, "選択してください");
        const lyricsToLoad = lyrics.includes($("lyricsPath").value) ? $("lyricsPath").value : (lyrics[0] || "");
        if (lyricsToLoad) {
          $("lyricsPath").value = lyricsToLoad;
          $("lyricsSelect").value = lyricsToLoad;
          try {
            const lyricsRes = await fetch(projectFileUrl(lyricsToLoad), { cache: "no-store" });
            if (lyricsRes.ok) applyLyrics(await lyricsRes.text());
          } catch {}
        } else {
          rawLyrics = "";
          $("lyricsPreview").textContent = "歌詞ファイルを選ぶとここに表示します";
        }
        setStatus( timingLoaded
          ? `曲フォルダからPV・同期JSONを読み込みました（PV: ${videoToLoad}）`
          : `曲フォルダからPVを読み込みました（${videoToLoad}）`);
      } catch {
        setStatus( "ファイル一覧を取得できません");
      }
    }

    function fillSelect(select, values, placeholder) {
      select.innerHTML = `<option value="">${placeholder}</option>`;
      for (const value of values) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      }
    }

    // Migrate D: paths in localStorage to C: (one-time fix after drive migration)
    (function migrateLocalStorageDrive() {
      const keys = ["pvToolProjectDir", "pvProjectTool.current"];
      for (const key of keys) {
        const val = localStorage.getItem(key);
        if (val && /D:/i.test(val)) {
          localStorage.setItem(key, val.replace(/D:/gi, "C:"));
        }
      }
    })();

    // 起動時: サーバーのプロジェクト一覧から最終更新が新しいものを自動選択
    (async function autoLoadOnStartup() {
      try {
        const res = await fetch("api/projects");
        const data = await res.json();
        const projects = (data.projects || []).filter(p => p.lastModified);
        if (projects.length > 0) {
          projects.sort((a, b) => b.lastModified - a.lastModified);
          const newest = projects[0];
          $("projectDirInput").value = newest.path;
          setCurrentProjectDir(newest.path, true);
          await loadFileLists();
          return;
        }
      } catch {}
      // フォールバック: localStorage / 手動入力
      const dir = ($("projectDirInput").value || "").trim() || localStorage.getItem("pvToolProjectDir") || "";
      if (dir) {
        await loadFileLists();
        return;
      }
      const saved = localStorage.getItem("pvProjectTool.current");
      if (saved) {
        try {
          const data = JSON.parse(saved);
          if (Array.isArray(data.scenes) && data.scenes.length > 0) {
            setProject(data);
          }
        } catch {}
      }
    })();

    render();
  </script>
